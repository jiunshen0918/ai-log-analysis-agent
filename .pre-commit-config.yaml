repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: semgrep-local
        name: Semgrep Security Scan
        entry: ai-log-analysis-agent/.venv/Scripts/pysemgrep.exe --config ai-log-analysis-agent/.semgrep/rules.yaml --error
        language: system
        types: [python]
